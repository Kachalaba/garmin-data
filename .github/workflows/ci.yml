name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyyaml

      - name: Compile-check all Python sources
        run: |
          python -m py_compile garmy_sync.py
          python -m py_compile analytics/*.py

      - name: Validate Grafana dashboard JSON
        run: |
          python -c "import json; json.load(open('grafana/dashboards/health-overview.json'))"

      - name: Validate provisioning YAML
        run: |
          python -c "import yaml; yaml.safe_load(open('grafana/provisioning/datasources/sqlite.yml'))"
          python -c "import yaml; yaml.safe_load(open('grafana/provisioning/dashboards/default.yml'))"
